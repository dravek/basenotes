name: Tests

on:
  push:
  pull_request:

jobs:
  phpunit:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: basenotes
          POSTGRES_USER: basenotes
          POSTGRES_PASSWORD: basenotes
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U basenotes -d basenotes"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Run tests
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_NAME: basenotes
          DB_USER: basenotes
          DB_PASS: basenotes
        run: vendor/bin/phpunit
